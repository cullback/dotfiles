keys:
  - &devy age19j6h7sszvw2huedumsen5vpkz5250rrw8epjje4snhdyxdl4narsxtl9u4
  - &atlantix age1m2k0n7d2ggfj429rrs7zqgxw8tfy29ewvt48n37k5x5xjdln5dls3yc2wf
  - &kraken age1kl7llf38u08rj5m4q9tx0rzv045td502av842lm3ndd4nrvhyexqddu4hl

creation_rules:
  # Per-host file for kraken — encrypted only to kraken, so it can be created and
  # decrypted on kraken alone (no cross-machine bootstrap).
  - path_regex: kraken\.yaml$
    key_groups:
      - age:
          - *kraken
  - path_regex: atlantix\.yaml$
    key_groups:
      - age:
          - *atlantix
  # Shared file for the rest (openrouter, atlantix's wg key).
  - path_regex: secrets\.yaml$
    key_groups:
      - age:
          - *devy
          - *atlantix
